<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Proyecto AR Educativo</title>
    <!-- A-Frame: motor de escena web AR/VR -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js">
    </script>
    <!-- AR.js: librería de realidad aumentada con marcadores -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js">
    </script>

    <script>

var scene, camera, renderer, clock, deltaTime, totalTime;

var arToolkitSource, arToolkitContext;

var markerRoot1, markerRoot2;

var mesh1;

initialize();
animate();

function initialize()
{
	scene = new THREE.Scene();

	let ambientLight = new THREE.AmbientLight( 0xcccccc, 0.5 );
	scene.add( ambientLight );
				
	camera = new THREE.Camera();
	scene.add(camera);

	renderer = new THREE.WebGLRenderer({
		antialias : true,
		alpha: true
	});
	renderer.setClearColor(new THREE.Color('lightgrey'), 0)
	renderer.setSize( 640, 480 );
	renderer.domElement.style.position = 'absolute'
	renderer.domElement.style.top = '0px'
	renderer.domElement.style.left = '0px'
	document.body.appendChild( renderer.domElement );

	clock = new THREE.Clock();
	deltaTime = 0;
	totalTime = 0;
	
	////////////////////////////////////////////////////////////
	// setup arToolkitSource
	////////////////////////////////////////////////////////////

	arToolkitSource = new THREEx.ArToolkitSource({
		sourceType : 'webcam',
	});

	function onResize()
	{
		arToolkitSource.onResize()	
		arToolkitSource.copySizeTo(renderer.domElement)	
		if ( arToolkitContext.arController !== null )
		{
			arToolkitSource.copySizeTo(arToolkitContext.arController.canvas)	
		}	
	}

	arToolkitSource.init(function onReady(){
		onResize()
	});
	
	// handle resize event
	window.addEventListener('resize', function(){
		onResize()
	});
	
	////////////////////////////////////////////////////////////
	// setup arToolkitContext
	////////////////////////////////////////////////////////////	

	// create atToolkitContext
	arToolkitContext = new THREEx.ArToolkitContext({
		cameraParametersUrl: 'data/camera_para.dat',
		detectionMode: 'mono'
	});
	
	// copy projection matrix to camera when initialization complete
	arToolkitContext.init( function onCompleted(){
		camera.projectionMatrix.copy( arToolkitContext.getProjectionMatrix() );
	});

	////////////////////////////////////////////////////////////
	// setup markerRoots
	////////////////////////////////////////////////////////////

	// build markerControls
	markerRoot1 = new THREE.Group();
	scene.add(markerRoot1);
	let markerControls1 = new THREEx.ArMarkerControls(arToolkitContext, markerRoot1, {
		type: 'pattern', patternUrl: "data/hiro.patt",
	})

	let geometry1	= new THREE.CubeGeometry(1,1,1);
	let material1	= new THREE.MeshNormalMaterial({
		transparent: true,
		opacity: 0.5,
		side: THREE.DoubleSide
	}); 
	
	mesh1 = new THREE.Mesh( geometry1, material1 );
	mesh1.position.y = 0.5;
	
	markerRoot1.add( mesh1 );
}


function update()
{
	// update artoolkit on every frame
	if ( arToolkitSource.ready !== false )
		arToolkitContext.update( arToolkitSource.domElement );
}


function render()
{
	renderer.render( scene, camera );
}


function animate()
{
	requestAnimationFrame(animate);
	deltaTime = clock.getDelta();
	totalTime += deltaTime;
	update();
	render();
}

</script>

</head>

<body style="margin: 0; overflow: hidden;">
    <!-- 
a-scene: contenedor principal de la escena. 
arjs: activa el modo AR con cámara web. 
vr-mode-ui: desactiva el botón VR innecesario en AR. -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <!-- Declarar el asset (modelo 3D) en el head de la escena -->
        <a-assets>
            <a-asset-item id="mi-modelo" src="solar_system_model_orrery.glb">
            </a-asset-item>
            <a-asset-item id="mi-modelo2" src="earth.glb">
            </a-asset-item>
        </a-assets>
        <!-- ============================================ 
MARCADOR 1: Objeto educativo principal 
 ============================================ -->
        <a-marker preset="hiro">

            <!-- Texto informativo sobre el objeto -->
            <a-text value="SISTEMA SOLAR\n" position="0 2 0" align="center" color="#b180d7" scale="1.5 1.5 1.5"
                background="true" background-color="#000000">
            </a-text>


            <!-- Usar el modelo dentro del marcador -->
            <a-gltf-model src="#mi-modelo" position="0 0.5 0" scale="0.5 0.5 0.5" animation="property: rotation; 
            to: 0 360 0; 
            loop: true; 
            dur: 5000">
            </a-gltf-model>
        </a-marker>

        <!-- MARCADOR 2: Información complementaria -->
        <a-marker type="pattern" url="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/data/patt.kanji">
            <!-- Planeta Tierra -->
            <a-gltf-model src="#mi-modelo2" position="0 0.5 0" scale="0.1 0.1 0.1" animation="property: rotation; 
            to: 0 360 0; 
            loop: true; 
            dur: 5000">
            </a-gltf-model>
            <!-- Texto secundario -->
            <a-text value="Dato adicional:\nTierra: Poblacion 7.8 mil millones" position="0 2 0" align="center" color="#FFFF00"
                scale="1.2 1.2 1.2">
            </a-text>
        </a-marker>

        <!-- Cámara del dispositivo -->
        <a-entity camera></a-entity>

    </a-scene>

</body>

</html>
