<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Proyecto AR Educativo</title>
    <!-- A-Frame: motor de escena web AR/VR -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js">
    </script>
    <!-- AR.js: librería de realidad aumentada con marcadores -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js">
    </script>
    <script>
        // Forzar uso de la cámara normal trasera sin gran angular
        window.selectCamera = async function() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                
                // Preferir la cámara trasera normal (no frontal, no ultra-gran angular)
                let selectedDeviceId = null;
                for (let device of videoDevices) {
                    const label = device.label.toLowerCase();
                    // Buscar cámara trasera normal (evitar frontal, ultra-wide, macro)
                    if ((label.includes('back') || label.includes('rear') || label.includes('main')) && 
                        !label.includes('front') && !label.includes('ultra') && !label.includes('wide')) {
                        selectedDeviceId = device.deviceId;
                        break;
                    }
                }
                
                // Si no encuentra, usar cualquier cámara trasera
                if (!selectedDeviceId && videoDevices.length > 0) {
                    selectedDeviceId = videoDevices[0].deviceId;
                }
                
                // Guardar en sessionStorage para usarla
                if (selectedDeviceId) {
                    sessionStorage.setItem('selectedCameraId', selectedDeviceId);
                }
            } catch (err) {
                console.log('Error seleccionando cámara:', err);
            }
        };
        
        // Sobrescribir getUserMedia para usar la cámara seleccionada
        const originalGetUserMedia = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
        navigator.mediaDevices.getUserMedia = function(constraints) {
            const cameraId = sessionStorage.getItem('selectedCameraId');
            if (cameraId) {
                constraints = constraints || {};
                constraints.video = {
                    deviceId: { exact: cameraId },
                    width: { min: 640, ideal: 1280, max: 1920 },
                    height: { min: 480, ideal: 720, max: 1080 }
                };
            }
            return originalGetUserMedia(constraints);
        };
        
        // Ejecutar selección de cámara cuando carga la página
        window.addEventListener('load', selectCamera);
    </script>
</head>

<body style="margin: 0; overflow: hidden;">
    <!-- 
a-scene: contenedor principal de la escena. 
arjs: activa el modo AR con cámara web. 
vr-mode-ui: desactiva el botón VR innecesario en AR. -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <!-- Declarar el asset (modelo 3D) en el head de la escena -->
        <a-assets>
            <a-asset-item id="mi-modelo" src="solar_system_model_orrery.glb">
            </a-asset-item>
            <a-asset-item id="mi-modelo2" src="earth.glb">
            </a-asset-item>
        </a-assets>
        <!-- ============================================ 
MARCADOR 1: Objeto educativo principal 
 ============================================ -->
        <a-marker preset="hiro">

            <!-- Texto informativo sobre el objeto -->
            <a-text value="SISTEMA SOLAR\n" position="0 2 0" align="center" color="#b180d7" scale="1.5 1.5 1.5"
                background="true" background-color="#000000">
            </a-text>


            <!-- Usar el modelo dentro del marcador -->
            <a-gltf-model src="#mi-modelo" position="0 0.5 0" scale="0.5 0.5 0.5" animation="property: rotation; 
            to: 0 360 0; 
            loop: true; 
            dur: 5000">
            </a-gltf-model>
        </a-marker>

        <!-- MARCADOR 2: Información complementaria -->
        <a-marker type="pattern" url="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/data/patt.kanji">
            <!-- Planeta Tierra -->
            <a-gltf-model src="#mi-modelo2" position="0 0.5 0" scale="0.1 0.1 0.1" animation="property: rotation; 
            to: 0 360 0; 
            loop: true; 
            dur: 5000">
            </a-gltf-model>
            <!-- Texto secundario -->
            <a-text value="Dato adicional:\nTierra: Poblacion 7.8 mil millones" position="0 2 0" align="center" color="#FFFF00"
                scale="1.2 1.2 1.2">
            </a-text>
        </a-marker>

        <!-- Cámara del dispositivo -->
        <a-entity camera></a-entity>

    </a-scene>

</body>

</html>
