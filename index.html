<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Proyecto AR Educativo</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene 
        embedded 
        vr-mode-ui="enabled: false"
        renderer="logarithmicDepthBuffer: true;"
        arjs="sourceType: webcam; sourceWidth:1280; sourceHeight:960; displayWidth: 1280; displayHeight: 960; debugUIEnabled: false;">
        
        <a-assets>
            <a-asset-item id="mi-modelo" src="solar_system_model_orrery.glb"></a-asset-item>
            <a-asset-item id="mi-modelo2" src="earth.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            <a-text value="SISTEMA SOLAR\n" position="0 2 0" align="center" color="#b180d7" scale="1.5 1.5 1.5" background="true" background-color="#000000"></a-text>
            <a-gltf-model src="#mi-modelo" position="0 0.5 0" scale="0.5 0.5 0.5" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000"></a-gltf-model>
        </a-marker>

        <a-marker preset="kanji">
            <a-gltf-model src="#mi-modelo2" position="0 0.5 0" scale="0.1 0.1 0.1" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000"></a-gltf-model>
            <a-text value="Dato adicional:\nTierra: Poblacion 7.8 mil millones" position="0 2 0" align="center" color="#FFFF00" scale="1.2 1.2 1.2"></a-text>
        </a-marker>

        <a-entity camera></a-entity>

    </a-scene>
</body>
</html>
